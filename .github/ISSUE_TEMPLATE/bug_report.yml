name: Bug Report
description: File a bug report
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: |
        How can we reproduce this issue? Include API endpoints, payloads, and environment details.
      placeholder: |
        1. Send POST /api/v1/...
        2. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages, status codes, stack traces.
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical (data loss or service unavailable)
        - High (core feature broken)
        - Medium (feature partially broken)
        - Low (cosmetic or minor)
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: e.g. Docker / local / staging / production
