name: Release Image

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      publish_image:
        description: "Push image to GHCR after build"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  build-image:
    name: Build Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Print Docker version
        run: docker version

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Print Docker Buildx version
        run: docker buildx version

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build image without push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Write build summary
        if: always()
        run: |
          {
            echo "## Release Image Build"
            echo
            echo "- Ref: \`${{ github.ref }}\`"
            echo "- Event: \`${{ github.event_name }}\`"
            echo "- Publish requested: \`${{ github.event_name == 'workflow_dispatch' && inputs.publish_image || github.event_name != 'workflow_dispatch' }}\`"
            echo "- Image: \`ghcr.io/${{ github.repository }}\`"
            echo "- Tags:"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  publish-image:
    name: Publish Image
    needs: build-image
    if: github.event_name == 'push' || inputs.publish_image == true
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Write publish summary
        if: always()
        run: |
          {
            echo "## Release Image Publish"
            echo
            echo "- Ref: \`${{ github.ref }}\`"
            echo "- Image: \`ghcr.io/${{ github.repository }}\`"
            echo "- Published tags:"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
