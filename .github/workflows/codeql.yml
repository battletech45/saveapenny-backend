name: CodeQL

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 24 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: "24"
          distribution: "temurin"
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - name: Build project
        run: mvn -B -DskipTests package

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3

      - name: Write analysis summary
        if: always()
        run: |
          {
            echo "## CodeQL"
            echo
            echo "- Ref: \`${{ github.ref }}\`"
            echo "- Event: \`${{ github.event_name }}\`"
            echo "- Language: \`java\`"
            echo "- Command: \`mvn -B -DskipTests package\`"
          } >> "$GITHUB_STEP_SUMMARY"
