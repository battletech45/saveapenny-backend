name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - "v*.*.*"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 24 (Temurin)
        uses: actions/setup-java@v5
        with:
          java-version: "24"
          distribution: "temurin"
          cache: maven

      - name: Install tesseract-ocr (runtime dependency)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends tesseract-ocr tesseract-ocr-eng

      - name: Print Tesseract version
        run: tesseract --version

      - name: Resolve OCR runtime paths
        run: |
          for path in /usr/share/tesseract-ocr/5/tessdata /usr/share/tesseract-ocr/4.00/tessdata /usr/share/tessdata /usr/local/share/tessdata; do
            if [ -d "$path" ]; then
              echo "OCR_TESSDATA_PATH=$path" >> "$GITHUB_ENV"
              echo "Resolved OCR_TESSDATA_PATH=$path"
              exit 0
            fi
          done
          echo "Unable to locate tessdata on runner" >&2
          exit 1

      - name: Build and test
        run: mvn -B clean verify

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/target/surefire-reports/*
            **/target/failsafe-reports/*
