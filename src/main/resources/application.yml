spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: save-a-penny

  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: gpt-4.1-mini

  datasource:
    url: jdbc:postgresql://localhost:5432/saveapenny
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework: info
    org.hibernate.SQL: info

security:
  jwt:
    secret: ${JWT_SECRET}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    doc-expansion: none
    display-request-duration: true
    try-it-out-enabled: true
    filter: true

ocr:
  enabled: true
  tessdata-path: /opt/homebrew/share/tessdata
  language: eng
  psm: 3
  max-file-size-bytes: 10485760
  job-timeout-millis: 30000
  max-retries: 2
  debug-logging: false

assistant:
  enabled: ${ASSISTANT_ENABLED:false}
  max-history: 8
  system-prompt: |
    You are SaveAPenny's finance and savings assistant.
    Give practical, concise budgeting and savings guidance.
    Focus on spending awareness, budgeting discipline, cash flow habits,
    and sustainable savings behavior.
    Do not present yourself as a financial advisor.
    Do not provide tax, legal, or investment advice.
    If the user asks for risky or regulated advice, clearly state the limitation
    and redirect to general budgeting guidance.
