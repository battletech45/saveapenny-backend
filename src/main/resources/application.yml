spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: save-a-penny

  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration

  datasource:
    url: jdbc:postgresql://localhost:5432/saveapenny
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}

cors:
  allowed-origins: http://localhost:3000

server:
  port: 8080

rate-limit:
  login:
    max-per-minute: 5
  api:
    max-per-minute: 60

security:
  jwt:
    secret: ${JWT_SECRET}
    refresh-token-expiry-days: 7

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: always
    metrics:
      enabled: true
    prometheus:
      enabled: true

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %X{requestId:-} %-5level %logger{36} - %msg%n"
  level:
    org.springframework: info
    org.hibernate.SQL: info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    doc-expansion: none
    display-request-duration: true
    try-it-out-enabled: true
    filter: true

assistant:
  enabled: ${ASSISTANT_ENABLED:false}
  max-history: 8
  model: ${ASSISTANT_MODEL:cohere/north-mini-code:free}
  provider: ${ASSISTANT_AI_PROVIDER:openrouter}
  openrouter-api-key: ${OPENROUTER_API_KEY:}
  openrouter-base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api}
  openrouter-site-url: ${OPENROUTER_SITE_URL:}
  openrouter-app-name: ${OPENROUTER_APP_NAME:SaveAPenny}
  system-prompt: |
    Your name is Penny Dog.
    You are SaveAPenny's finance and savings assistant.
    If a user asks your name or refers to the assistant, respond as Penny Dog.
    Give practical, concise budgeting and savings guidance.
    Focus on spending awareness, budgeting discipline, cash flow habits,
    and sustainable savings behavior.
    Do not present yourself as a financial advisor.
    Do not provide tax, legal, or investment advice.
    If the user asks for risky or regulated advice, clearly state the limitation
    and redirect to general budgeting guidance.
    When the user asks whether a goal is on track, whether they are falling
    behind, or how a goal is doing, use goal progress tools when available.
    OFF_TRACK means the user may already have a notification. AT_RISK means
    they are close to falling behind. NO_PROJECTION means there is no saved
    simulation run yet and the user should be offered a simulation.

goal:
  progress:
    enabled: false
    off-track-ratio: 0.10
    at-risk-ratio: 0.05
    off-track-persistence-months: 2
    cron: "0 0 6 * * *"

insight:
  enabled: false
  cron: "0 30 6 * * *"
  max-insights-per-generation: 10
  deduplication-window-days: 7
  stddev-threshold: 3.0
  max-amount-ratio: 0.5
  ai-enhanced: false
  model: ${INSIGHT_MODEL:cohere/north-mini-code:free}
  provider: ${INSIGHT_AI_PROVIDER:openrouter}
  openrouter-api-key: ${OPENROUTER_API_KEY:}
  openrouter-base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api}

ocr:
  enabled: true
  tessdata-path: ${OCR_TESSDATA_PATH:}
  language: eng
  psm: 3
  max-file-size-bytes: 10485760
  job-timeout-millis: 30000
  max-retries: 2
  debug-logging: false

stock:
  enabled: ${STOCK_ENABLED:true}
  api-key: ${ALPHA_VANTAGE_API_KEY:}
  base-url: https://www.alphavantage.co
  rate-limit-per-minute: 5
  rate-limit-per-day: 25
