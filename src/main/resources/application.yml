spring:
  application:
    name: save-a-penny

  datasource:
    url: jdbc:postgresql://localhost:5432/saveapenny
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

logging:
  level:
    org.springframework: info
    org.hibernate.SQL: info

security:
  jwt:
    secret: ${JWT_SECRET}
