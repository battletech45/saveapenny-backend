spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: save-a-penny

  datasource:
    url: jdbc:postgresql://localhost:5432/saveapenny
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework: info
    org.hibernate.SQL: info

security:
  jwt:
    secret: ${JWT_SECRET}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    doc-expansion: none
    display-request-duration: true
    try-it-out-enabled: true
    filter: true

ocr:
  enabled: true
  tessdata-path: /opt/homebrew/share/tessdata
  language: eng
  psm: 3
  max-file-size-bytes: 10485760
  job-timeout-millis: 30000
  max-retries: 2
  debug-logging: false
